---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meshcore-proxy
  namespace: flux
spec:
  interval: 1h
  chart:
    spec:
      chart: application
      version: 6.16.1
      sourceRef:
        kind: HelmRepository
        name: meshcore-proxy
      interval: 1h
  releaseName: meshcore-proxy
  targetNamespace: meshcore-proxy
  storageNamespace: meshcore-proxy
  valuesFrom:
    - kind: ConfigMap
      name: meshcore-proxy
    - kind: Secret
      name: meshcore-proxy
      valuesKey: nodename
      targetPath: deployment.nodeSelector.kubernetes\.io/hostname
