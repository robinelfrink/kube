apiVersion: gitops.kluctl.io/v1beta1
kind: KluctlDeployment
metadata:
  name: config
  namespace: cluster
spec:
  interval: 5m
  source:
    git:
      url: https://github.com/robinelfrink/kube.git
      ref:
        branch: {{ config.git_branch }}
  excludeTags:
    - manifests
  decryption:
    provider: sops
    secretRef:
      name: sops
  timeout: 2m
  target: {{ target.name }}
  prune: true
  delete: true
