apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: vaultwarden
  namespace: flux
spec:
  interval: 10m
  path: "./apps/vaultwarden"
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: kube
  postBuild:
    substituteFrom:
      - kind: Secret
        name: vaultwarden
