apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ${name}
  namespace: flux
spec:
  interval: 1h
  releaseName: ${name}
  dependsOn:
    - name: nfs
    - name: cert-manager
    - name: ingress-nginx
  chart:
    spec:
      chart: netbox
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: ${name}
      interval: 1h
  targetNamespace: ${namespace}
  storageNamespace: ${namespace}
  valuesFrom:
    - kind: ConfigMap
      name: ${name}-values
    - kind: Secret
      name: ${name}-values
      valuesKey: values
      optional: true
