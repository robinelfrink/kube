apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-values
  namespace: flux
data:
  values.yaml: |
    vaultwarden:
      allowSignups: false
    admin:
      enabled: true
    ingress:
      enabled: true
      host: vaultwarden.local
      annotations:
        cert-manager.io/cluster-issuer: selfsigned
        kubernetes.io/ingress.class: nginx
      tls: []
        - secretName: vaultwarden-tls
          hosts:
            - vaultwarden.local
    persistence:
      enabled: true
      storageClass: "nfs"
    image:
      tag: "1.28.1"
    securityContext:
      readOnlyRootFilesystem: true
