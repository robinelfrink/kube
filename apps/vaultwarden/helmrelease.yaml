apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux
spec:
  interval: 1h
  releaseName: vaultwarden
  dependsOn:
    - name: nfs-subdir-external-provisioner
    - name: cert-manager
    - name: cluster-issuers
    - name: ingress-nginx
  chart:
    spec:
      chart: vaultwarden
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
      interval: 1h
  targetNamespace: vaultwarden
  storageNamespace: vaultwarden
  valuesFrom:
    - kind: ConfigMap
      name: vaultwarden-values
    - kind: Secret
      name: cluster-info
      valuesKey: cluster.issuer
      targetPath: ingress.annotations.cert-manager\.io\/cluster-issuer
    - kind: Secret
      name: cluster-info
      valuesKey: vaultwarden.hostname
      targetPath: ingress.host
    - kind: Secret
      name: cluster-info
      valuesKey: vaultwarden.hostname
      targetPath: ingress.tls[0].hosts[0]
