apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux
spec:
  interval: 1h
  releaseName: vaultwarden
  dependsOn:
    - name: nfs-subdir-external-provisioner
    - name: cert-manager
    - name: cluster-issuers
    - name: ingress-nginx
  chart:
    spec:
      chart: vaultwarden
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
      interval: 1h
  targetNamespace: vaultwarden
  storageNamespace: vaultwarden
  install:
    createNamespace: true
  values:
    vaultwarden:
      allowSignups: false
      admin:
        enabled: true
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: nginx
    persistence:
      enabled: true
      storageClass: "nfs"
    image:
      tag: "1.28.1"
    securityContext:
      readOnlyRootFilesystem: true
  valuesFrom:
    - kind: Secret
      name: cluster-info
      valuesKey: cluster.issuer
      targetPath: ingress.annotations.cert-manager\.io\/cluster-issuer
    - kind: Secret
      name: cluster-info
      valuesKey: vaultwarden.hostname
      targetPath: ingress.host
