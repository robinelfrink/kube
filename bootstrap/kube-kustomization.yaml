apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: kube
  namespace: kube-flux
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
      namespace: kube-system
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: kube
  path: "./"
  prune: false
  timeout: 5m

