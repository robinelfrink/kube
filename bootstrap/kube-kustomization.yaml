apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: kube
  namespace: flux
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: kube
  path: "./clusters/prod"
  prune: false
  timeout: 5m

