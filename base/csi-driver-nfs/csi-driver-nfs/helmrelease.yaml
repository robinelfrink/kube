apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: flux
spec:
  interval: 1h
  releaseName: nfs
  targetNamespace: csi-driver-nfs
  storageNamespace: csi-driver-nfs
  chart:
    spec:
      chart: csi-driver-nfs
      version: v4.4.0
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
      interval: 1h
  values:
    controller:
      runOnControlPlane: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      externalSnapshotter:
        enabled: false
