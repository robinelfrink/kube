apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: storageclass
  namespace: flux
spec:
  interval: 10m
  path: "./base/csi-driver-nfs/storageclass"
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: kube
  dependsOn:
  - name: csi-driver-nfs
  postBuild:
    substituteFrom:
      - kind: Secret
        name: secrets
