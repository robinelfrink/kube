apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: clusterissuers
  namespace: flux
spec:
  interval: 30m
  path: ./base/cert-manager/clusterissuers
  prune: false
  sourceRef:
    kind: GitRepository
    name: kube
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-info
