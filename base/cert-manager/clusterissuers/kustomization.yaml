apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - letsencrypt.yaml
  - letsencrypt-staging.yaml
  - selfsigned.yaml
replacements:
  - source:
      kind: Secret
      name: cluster-info
      fieldPath: data."admin.email"
    targets:
      - select:
          kind: ClusterIssuer
        reject:
          - kind: ClusterIssuer
            name: selfsigned
        fieldPaths:
          - spec.acme.email
