apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux
spec:
  interval: 1h
  releaseName: cilium
  targetNamespace: kube-system
  storageNamespace: kube-system
  chart:
    spec:
      chart: cilium
      version: v1.13.4
      sourceRef:
        kind: HelmRepository
        name: cilium
      interval: 1h
  values:
    k8sServicePort: 6443
    rollOutCiliumPods: true
    securityContext:
      privileged: false
      seLinuxOptions:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cni:
      uninstall: false
    enableXTSocketFallback: false
    hubble:
      relay:
        enabled: true
        rollOutPods: true
    ipam:
      mode: kubernetes
    kubeProxyReplacement: strict
    localRedirectPolicy: true
    operator:
      replicas: 1
      rollOutPods: true
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
  valuesFrom:
    - kind: Secret
      name: cluster-info
      valuesKey: apiAddress
      targetPath: k8sServiceHost
