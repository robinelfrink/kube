apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux
spec:
  interval: 1h
  releaseName: cilium
  targetNamespace: kube-system
  storageNamespace: kube-system
  chart:
    spec:
      chart: cilium
      version: v1.13.4
      sourceRef:
        kind: HelmRepository
        name: cilium
      interval: 1h
  values:
    ipam:
      mode: kubernetes
    kubeProxyReplacement: strict
    k8sServicePort: 6443
    operator:
      replicas: 1
    securityContext:
      privileged: true
    hubble:
      relay:
        enabled: true
  valuesFrom:
    - kind: Secret
      name: cluster-info
      valuesKey: apiAddress
      targetPath: k8sServiceHost
