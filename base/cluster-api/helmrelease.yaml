apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cluster-api-operator
  namespace: flux
spec:
  interval: 1h
  chart:
    spec:
      chart: cluster-api-operator
      version: 0.8.1
      sourceRef:
        kind: HelmRepository
        name: cluster-api-operator
      interval: 1h
  releaseName: cluster-api
  targetNamespace: cluster-api
  storageNamespace: cluster-api
  values:
    cert-manager:
      enabled: true
